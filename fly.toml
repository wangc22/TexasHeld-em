app = "texas-poker-server"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  HOST = "0.0.0.0"
  CORS_ORIGIN = "*"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
